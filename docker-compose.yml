services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: scopery-postgres
    environment:
      POSTGRES_DB: scopery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345678"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scopery"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scopery-redis
    command: redis-server --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: scopery-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-scopery}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-scopery-local-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-scopery} ${MINIO_ROOT_PASSWORD:-scopery-local-secret}; do sleep 2; done;
      mc mb --ignore-existing local/${MINIO_BUCKET:-scopery-local};
      mc anonymous set none local/${MINIO_BUCKET:-scopery-local};
      mc stat local/${MINIO_BUCKET:-scopery-local};
      exit 0;
      "

  scopery-backend:
    build: .
    container_name: scopery-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://scopery-postgres:5432/scopery
      REDIS_HOST: scopery-redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
  minio-data:
