# Merge these services into the repository docker-compose.yml.
# Existing Postgres and Redis services remain unchanged.

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.16
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-scopery}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-scopery-local-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-scopery} ${MINIO_ROOT_PASSWORD:-scopery-local-secret}; do sleep 2; done;
      mc mb --ignore-existing local/${MINIO_BUCKET:-scopery-local};
      mc anonymous set none local/${MINIO_BUCKET:-scopery-local};
      mc stat local/${MINIO_BUCKET:-scopery-local};
      exit 0;
      "

volumes:
  elasticsearch-data:
  minio-data:
