spring:
  application:
    name: spr-scopery-be

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

scopery:
  workspace:
    use-effective-access: ${WORKSPACE_USE_EFFECTIVE_ACCESS:true}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:60}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}

  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    cookie-secure: ${JWT_COOKIE_SECURE:true}

  cors:
    # Comma-separated explicit origins. Never use "*" with allow-credentials=true.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}

  platform:
    outbox:
      enabled: ${PLATFORM_OUTBOX_ENABLED:true}
      batch-size: ${PLATFORM_OUTBOX_BATCH_SIZE:50}
      max-attempts: ${PLATFORM_OUTBOX_MAX_ATTEMPTS:10}
      lock-seconds: ${PLATFORM_OUTBOX_LOCK_SECONDS:60}
      fixed-delay-ms: ${PLATFORM_OUTBOX_FIXED_DELAY_MS:5000}
      base-retry-delay-seconds: ${PLATFORM_OUTBOX_BASE_RETRY_DELAY_SECONDS:30}
    idempotency:
      ttl-hours: ${PLATFORM_IDEMPOTENCY_TTL_HOURS:24}
      in-progress-lock-seconds: ${PLATFORM_IDEMPOTENCY_IN_PROGRESS_LOCK_SECONDS:120}
      cleanup-enabled: ${PLATFORM_IDEMPOTENCY_CLEANUP_ENABLED:true}
      cleanup-cron: ${PLATFORM_IDEMPOTENCY_CLEANUP_CRON:0 15 * * * *}
      require-enabled: ${PLATFORM_IDEMPOTENCY_REQUIRE_ENABLED:false}
      require-on-paths: ${PLATFORM_IDEMPOTENCY_REQUIRE_PATHS:/api/projects/*/tasks,/api/projects/*/scope-packages,/api/projects/*/quotes}
    swagger:
      public: ${PLATFORM_SWAGGER_PUBLIC:true}

  reporting:
    snapshot-retention-days: ${REPORTING_SNAPSHOT_RETENTION_DAYS:90}
    snapshot-retention-enabled: ${REPORTING_SNAPSHOT_RETENTION_ENABLED:true}
    snapshot-retention-cron: ${REPORTING_SNAPSHOT_RETENTION_CRON:0 45 2 * * *}

  security:
    secret:
      master-key: ${SCOPERY_SECRET_MASTER_KEY:}
      key-version: ${SCOPERY_SECRET_KEY_VERSION:v1}
  aiagent:
    runtime-environment: ${AIAGENT_RUNTIME_ENVIRONMENT:DEV}
    playground:
      enabled: ${AIAGENT_PLAYGROUND_ENABLED:true}
    execution:
      restrict-lifecycle-writes: ${AIAGENT_EXECUTION_RESTRICT_LIFECYCLE_WRITES:true}
    provider:
      openai:
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
        timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:60}
        api-key: ${OPENAI_API_KEY:}

  storage:
    provider: s3-compatible
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    region: ${MINIO_REGION:us-east-1}
    bucket: ${MINIO_BUCKET:scopery-local}
    access-key: ${MINIO_ACCESS_KEY:scopery}
    secret-key: ${MINIO_SECRET_KEY:scopery-local-secret}
    path-style-access: true
    presigned-upload-expiry-minutes: ${STORAGE_PRESIGNED_UPLOAD_EXPIRY_MINUTES:10}
    presigned-download-expiry-minutes: ${STORAGE_PRESIGNED_DOWNLOAD_EXPIRY_MINUTES:5}
    max-upload-size-bytes: ${STORAGE_MAX_UPLOAD_SIZE_BYTES:104857600}

  embedding:
    provider: OPENAI
    model: text-embedding-3-small
    dimensions: 1536
    api-key: ${OPENAI_API_KEY:}

  ai-assistant:
    prompt-profile-code: ${AI_ASSISTANT_PROMPT_PROFILE:SCOPERY_CONTEXTUAL_ASSISTANT_V1}
    default-model-provider: ${AI_ASSISTANT_DEFAULT_MODEL_PROVIDER:OPENAI}
    default-model-name: ${AI_ASSISTANT_DEFAULT_MODEL_NAME:gpt-4o}
    emitter-timeout: ${AI_ASSISTANT_EMITTER_TIMEOUT:180s}
    heartbeat-interval: ${AI_ASSISTANT_HEARTBEAT_INTERVAL:15s}
    stream-event-retention: ${AI_ASSISTANT_STREAM_EVENT_RETENTION:24h}
    conversation-retention: ${AI_ASSISTANT_CONVERSATION_RETENTION:180d}
    deleted-purge-delay: ${AI_ASSISTANT_DELETED_PURGE_DELAY:30d}
    tool-trace-retention: ${AI_ASSISTANT_TOOL_TRACE_RETENTION:30d}
    max-user-message-chars: ${AI_ASSISTANT_MAX_USER_MESSAGE_CHARS:8000}
    max-messages-per-conversation: ${AI_ASSISTANT_MAX_MESSAGES_PER_CONVERSATION:500}
    max-input-tokens: ${AI_ASSISTANT_MAX_INPUT_TOKENS:24000}
    max-output-tokens: ${AI_ASSISTANT_MAX_OUTPUT_TOKENS:2000}
    max-evidence-chunks: ${AI_ASSISTANT_MAX_EVIDENCE_CHUNKS:8}
    max-active-streams-per-user: ${AI_ASSISTANT_MAX_ACTIVE_STREAMS:2}
    max-turns-per-user-per-day: ${AI_ASSISTANT_MAX_TURNS_PER_DAY:200}
    max-tokens-per-user-per-day: ${AI_ASSISTANT_MAX_TOKENS_PER_DAY:500000}
    memory:
      trigger-turns: ${AI_ASSISTANT_MEMORY_TRIGGER_TURNS:20}
      trigger-unsummarized-tokens: ${AI_ASSISTANT_MEMORY_TRIGGER_TOKENS:12000}
      keep-latest-messages: ${AI_ASSISTANT_MEMORY_KEEP_MESSAGES:8}
      max-summary-tokens: ${AI_ASSISTANT_MEMORY_MAX_SUMMARY_TOKENS:2000}
    jobs:
      stream-event-purge-cron: ${AI_ASSISTANT_STREAM_PURGE_CRON:0 0 * * * *}
      retention-cron: ${AI_ASSISTANT_RETENTION_CRON:0 0 3 * * *}
      stale-recovery-fixed-delay-ms: ${AI_ASSISTANT_STALE_RECOVERY_DELAY_MS:300000}
      heartbeat-fixed-delay-ms: ${AI_ASSISTANT_HEARTBEAT_DELAY_MS:15000}

  knowledge:
    chunking:
      strategy-version: chunk-v1
      task-target-tokens: ${KNOWLEDGE_CHUNK_TASK_TARGET_TOKENS:600}
      document-target-tokens: ${KNOWLEDGE_CHUNK_DOCUMENT_TARGET_TOKENS:800}
      meeting-target-tokens: ${KNOWLEDGE_CHUNK_MEETING_TARGET_TOKENS:600}

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:false}

  ai:
    recommendation:
      llm-enrichment-enabled: false
      phase21-read-compat-enabled: true
      phase21-write-bridge-enabled: false
      phase21-legacy-apply-visible: true

notification:
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
    provider: ${NOTIFICATION_EMAIL_PROVIDER:LOG_ONLY}
    from-address: ${NOTIFICATION_EMAIL_FROM_ADDRESS:no-reply@local.test}
    from-name: ${NOTIFICATION_EMAIL_FROM_NAME:Scopery}
    frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
    outbox:
      enabled: ${NOTIFICATION_EMAIL_OUTBOX_ENABLED:true}
      batch-size: ${NOTIFICATION_EMAIL_OUTBOX_BATCH_SIZE:20}
      max-retry: ${NOTIFICATION_EMAIL_OUTBOX_MAX_RETRY:3}
      retry-delay-seconds: ${NOTIFICATION_EMAIL_OUTBOX_RETRY_DELAY_SECONDS:60}
      fixed-delay-ms: ${NOTIFICATION_EMAIL_OUTBOX_FIXED_DELAY_MS:10000}

logging:
  level:
    root: INFO
    com.company.scopery: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

ai-action:
  enabled: true
  worker:
    concurrency: 4
    lease-seconds: 60
    renew-seconds: 20
    poll-interval-ms: 1000
  limits:
    max-plan-steps: 25
    max-plan-targets: 100
    max-concurrent-per-user-workspace: 2
  ttl:
    plan-seconds: 1800
    preview-seconds: 900
    confirmation-seconds: 600
    realtime-event-days: 7
  websocket:
    endpoint: /api/ws/ai-actions
    heartbeat-ms: 15000
    max-frame-bytes: 65536
  redis:
    channel: scopery:ai-action:events:v1
    replay-delay-ms: 30000
