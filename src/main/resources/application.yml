spring:
  application:
    name: spr-scopery-be

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

scopery:
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:60}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}

  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    cookie-secure: ${JWT_COOKIE_SECURE:true}

  security:
    secret:
      master-key: ${SCOPERY_SECRET_MASTER_KEY:}
      key-version: ${SCOPERY_SECRET_KEY_VERSION:v1}
  aiagent:
    runtime-environment: ${AIAGENT_RUNTIME_ENVIRONMENT:DEV}
    provider:
      openai:
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
        timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:60}

logging:
  level:
    root: INFO
    com.company.scopery: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
